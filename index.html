<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;}
body{background:#f5f4f0;font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;min-height:100vh;}

/* LAYOUT */
#app{max-width:1060px;margin:0 auto;padding:clamp(12px,3vw,24px) clamp(12px,3vw,20px) 80px;}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:clamp(14px,3vw,22px);flex-wrap:wrap;gap:10px;}
.logo{font-family:'Lora',serif;font-size:clamp(1.3rem,4vw,1.7rem);font-weight:700;color:#2c2c2c;}
.logo span{color:#5a8a6a;}
.sub{font-size:clamp(0.58rem,1.5vw,0.68rem);color:#aaa;margin-top:2px;letter-spacing:1px;text-transform:uppercase;}
.nav{display:flex;gap:5px;flex-wrap:wrap;}
.nb{background:white;border:1.5px solid #e0ddd8;color:#888;padding:clamp(5px,1.5vw,7px) clamp(10px,2vw,14px);border-radius:999px;cursor:pointer;font-size:clamp(0.65rem,1.8vw,0.75rem);font-weight:500;font-family:inherit;white-space:nowrap;}
.nb.active{background:#2c2c2c;color:white;border-color:#2c2c2c;}

/* CONTROLS */
.ctrl{display:flex;align-items:center;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.ctrl select,.ctrl input[type=number],.ctrl input[type=text]{background:white;border:1.5px solid #e0ddd8;color:#444;padding:6px 10px;border-radius:999px;font-family:inherit;font-size:clamp(0.65rem,1.8vw,0.77rem);outline:none;}
.ctrl .ci{width:70px;}
.ctrl .si{width:clamp(120px,20vw,160px);border-radius:999px;}
.sp{width:1px;height:22px;background:#e0ddd8;flex-shrink:0;}
.pill{padding:5px 11px;border-radius:999px;border:1.5px solid #e0ddd8;background:white;color:#999;cursor:pointer;font-size:clamp(0.62rem,1.8vw,0.72rem);font-weight:500;font-family:inherit;white-space:nowrap;}
.pill.a0{background:#2c2c2c;color:white;border-color:#2c2c2c;}
.pill.a1{background:#eef6f1;color:#5a8a6a;border-color:#5a8a6a;}
.pill.a2{background:#f4f0fa;color:#7a5aa0;border-color:#7a5aa0;}
.pill.a3{background:#edf2f8;color:#4a6aa0;border-color:#4a6aa0;}
.pill.a4{background:#f4f0fa;color:#7a5aa0;border-color:#7a5aa0;}
.sbtn{background:#5a8a6a;border:none;color:white;padding:6px 13px;border-radius:999px;cursor:pointer;font-size:clamp(0.62rem,1.8vw,0.72rem);font-weight:600;font-family:inherit;white-space:nowrap;}
.cbtn{background:white;border:1.5px solid #e0ddd8;color:#666;padding:5px 12px;border-radius:999px;cursor:pointer;font-size:clamp(0.62rem,1.8vw,0.72rem);font-family:inherit;}
.lbtn{background:white;border:1.5px solid #e0ddd8;color:#666;padding:5px 12px;border-radius:999px;cursor:pointer;font-size:clamp(0.62rem,1.8vw,0.72rem);font-family:inherit;}
.lbtn.on{border-color:#f0a030;color:#a06020;background:#fff8e8;}

/* SYNC STATUS */
.sync-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:12px;margin-bottom:12px;font-size:0.75rem;font-weight:500;}
.sync-bar.ok{background:#eef6f1;color:#3a7a5a;}
.sync-bar.err{background:#faeef0;color:#a04a5a;}
.sync-bar.sync{background:#eaf3f9;color:#4a72a0;}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sync-bar.ok .sync-dot{background:#5a8a6a;}
.sync-bar.err .sync-dot{background:#c05050;}
.sync-bar.sync .sync-dot{background:#4a72a0;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* ALERTS */
.alert-bar{background:#fff8e8;border:1.5px solid #f0d080;border-radius:12px;padding:10px 14px;margin-bottom:12px;display:flex;gap:7px;align-items:flex-start;flex-wrap:wrap;}
.ac{background:#fff0c0;color:#a06820;border-radius:999px;padding:2px 8px;font-size:0.68rem;font-weight:600;}

/* SUMMARY */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(7px,2vw,12px);margin-bottom:14px;}
.sc{background:white;border-radius:16px;padding:clamp(12px,2.5vw,18px) clamp(12px,2.5vw,18px);border:1.5px solid #e8e6e0;}
.sc.dk{background:#2c2c2c;border-color:#2c2c2c;}
.sl{font-size:clamp(0.55rem,1.5vw,0.65rem);font-weight:600;color:#bbb;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
.sc.dk .sl{color:#666;}
.sv{font-family:'Lora',serif;font-size:clamp(1.05rem,3vw,1.4rem);font-weight:700;color:#2c2c2c;line-height:1;}
.sc.dk .sv{color:white;}
.su{font-size:clamp(0.58rem,1.5vw,0.68rem);color:#bbb;margin-top:4px;}
.sc.dk .su{color:#555;}

/* FORM */
.fc{background:white;border-radius:16px;border:1.5px solid #e8e6e0;padding:clamp(14px,3vw,20px);margin-bottom:14px;}
.tt{display:flex;background:#f5f4f0;border-radius:9px;padding:3px;margin-bottom:14px;width:fit-content;}
.tb{padding:6px 16px;border-radius:7px;border:none;cursor:pointer;font-size:clamp(0.7rem,2vw,0.76rem);font-weight:600;background:none;color:#aaa;font-family:inherit;}
.tb.aw{background:white;color:#a04a5a;box-shadow:0 1px 5px rgba(0,0,0,.08);}
.tb.ap{background:white;color:#3a7a5a;box-shadow:0 1px 5px rgba(0,0,0,.08);}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:12px;}
.form-grid .wide{grid-column:span 2;}
.fg{display:flex;flex-direction:column;gap:3px;}
.fl{font-size:0.62rem;font-weight:600;color:#bbb;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;}
.fi,.fs{background:#faf9f7;border:1.5px solid #e8e6e0;color:#333;padding:8px 10px;border-radius:9px;font-family:inherit;font-size:clamp(0.75rem,2vw,0.82rem);width:100%;outline:none;}
.ot{display:flex;gap:4px;}
.owb{flex:1;padding:8px 4px;border-radius:9px;border:1.5px solid #e8e6e0;background:#faf9f7;cursor:pointer;font-size:0.72rem;font-weight:600;color:#aaa;text-align:center;font-family:inherit;}

.owb.ama{background:#f4f0fa;color:#7a5aa0;border-color:#7a5aa0;}
.addbtn{background:#2c2c2c;color:white;border:none;padding:10px 20px;border-radius:10px;cursor:pointer;font-size:clamp(0.75rem,2vw,0.82rem);font-weight:600;font-family:inherit;float:right;}
.addbtn.inc{background:#3a7a5a;}

.lp{background:white;border-radius:16px;border:1.5px solid #e8e6e0;padding:16px;margin-bottom:14px;}
.lp-title{font-family:'Lora',serif;font-weight:600;color:#2c2c2c;font-size:0.9rem;margin-bottom:10px;}
.lg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;}
.li label{font-size:0.63rem;color:#999;display:block;margin-bottom:3px;}

.oc{background:white;border-radius:16px;padding:clamp(12px,2.5vw,18px);border:1.5px solid #e8e6e0;display:flex;align-items:center;gap:12px;}
.oa{width:clamp(36px,5vw,44px);height:clamp(36px,5vw,44px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Lora',serif;font-size:clamp(0.9rem,2.5vw,1.05rem);font-weight:700;flex-shrink:0;}
.onm{font-size:0.63rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#bbb;margin-bottom:3px;}
.oamt{font-family:'Lora',serif;font-size:clamp(1.05rem,3vw,1.3rem);font-weight:700;line-height:1;}
.os{font-size:0.65rem;color:#bbb;margin-top:3px;}
.obw{height:3px;background:#f0ede8;border-radius:999px;margin-top:6px;}
.ob2{height:3px;border-radius:999px;}

/* CAT CARDS */
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:14px;}
.ig{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:14px;}
.cc{background:white;border:1.5px solid #e8e6e0;border-radius:13px;padding:11px 11px 9px;}
.ci2{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:1rem;margin-bottom:4px;}
.cn{font-size:0.61rem;font-weight:500;color:#999;margin-bottom:2px;}
.ca{font-family:'Lora',serif;font-size:clamp(0.8rem,2.5vw,0.92rem);font-weight:700;margin-bottom:3px;}
.cbw{height:3px;background:#f0ede8;border-radius:999px;}
.cb2{height:3px;border-radius:999px;}
.clim{font-size:0.6rem;color:#bbb;margin-top:2px;}
.cover{color:#c06030 !important;}

/* TABLE */
.tc{background:white;border:1.5px solid #e8e6e0;border-radius:16px;overflow:hidden;margin-bottom:14px;}
.th2{padding:13px 16px 10px;font-family:'Lora',serif;font-size:clamp(0.82rem,2.5vw,0.92rem);font-weight:600;color:#2c2c2c;border-bottom:1.5px solid #f0ede8;display:flex;align-items:center;justify-content:space-between;}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:480px;}
th{font-size:clamp(0.55rem,1.5vw,0.63rem);font-weight:600;color:#bbb;letter-spacing:1.5px;text-transform:uppercase;padding:8px 12px;text-align:left;background:#faf9f7;white-space:nowrap;}
td{padding:9px 12px;font-size:clamp(0.68rem,1.8vw,0.77rem);color:#444;border-bottom:1px solid #f5f3f0;white-space:nowrap;}
tr:last-child td{border-bottom:none;}
.dbtn{background:none;border:none;color:#ddd;cursor:pointer;font-size:0.83rem;padding:2px 5px;border-radius:5px;}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:999px;font-size:0.61rem;font-weight:600;white-space:nowrap;}
.bd{background:#eef6f1;color:#5a8a6a;}.bp{background:#f4f0fa;color:#7a5aa0;}
.bw{background:#faeef0;color:#a04a5a;}.bi{background:#eaf5f0;color:#3a7a5a;}
.bpr{background:#edf2f8;color:#4a6aa0;}.bma{background:#f4f0fa;color:#7a5aa0;}
.catbadge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:999px;font-size:clamp(0.6rem,1.5vw,0.7rem);font-weight:600;white-space:nowrap;}
.empty{text-align:center;padding:38px;font-size:0.82rem;color:#ccc;}
.tf{padding:10px 16px;border-top:1.5px solid #f0ede8;display:flex;justify-content:flex-end;gap:14px;align-items:center;font-size:clamp(0.68rem,1.8vw,0.78rem);flex-wrap:wrap;}

.xw{overflow-x:auto;border-radius:16px;border:1.5px solid #e8e6e0;background:white;margin-bottom:14px;}
.xt{border-collapse:collapse;min-width:760px;width:100%;}
.xt th,.xt td{border:1px solid #ede8e0;padding:0;}
.xth{font-size:0.61rem;font-weight:700;color:#888;letter-spacing:1px;text-transform:uppercase;padding:7px 8px;background:#faf9f7;white-space:nowrap;text-align:center;}
.xthc{text-align:left;position:sticky;left:0;z-index:2;background:#faf9f7;min-width:130px;}
.xcat{font-size:0.71rem;font-weight:600;color:#444;padding:7px 9px;position:sticky;left:0;background:white;z-index:1;white-space:nowrap;}
.xval{font-size:0.71rem;font-weight:500;color:#333;padding:6px 7px;text-align:right;white-space:nowrap;}
.xsum{font-size:0.71rem;font-weight:700;color:#2c2c2c;padding:6px 7px;text-align:right;background:#f8f6f2;}
.xsr td{background:#f5f3ee !important;font-weight:700;}
.xsr .xcat{background:#f5f3ee;color:#666;}
.xsh td{background:#f0ede8;font-family:'Lora',serif;font-size:0.78rem;font-weight:600;color:#555;padding:7px 12px;}

/* CHARTS */
.cr{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.chc{background:white;border:1.5px solid #e8e6e0;border-radius:16px;padding:16px;}
.cht{font-family:'Lora',serif;font-size:clamp(0.8rem,2.5vw,0.9rem);font-weight:600;color:#2c2c2c;margin-bottom:12px;}
canvas{width:100% !important;display:block;}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:14px;}
.md{background:white;border-radius:20px;width:100%;max-width:480px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.18);max-height:90vh;overflow-y:auto;}
.mh{padding:16px 20px 12px;border-bottom:1.5px solid #f0ede8;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:white;}
.mt2{font-family:'Lora',serif;font-size:0.97rem;font-weight:700;color:#2c2c2c;}
.mc{background:none;border:none;font-size:1.1rem;color:#bbb;cursor:pointer;padding:3px 6px;}
.mb{padding:18px 20px;}
.uz{border:2px dashed #e0ddd8;border-radius:13px;padding:28px 18px;text-align:center;cursor:pointer;background:#faf9f7;margin-bottom:12px;}
.pi{width:100%;border-radius:13px;margin-bottom:11px;max-height:250px;object-fit:contain;background:#f5f4f0;display:block;}
.sar{display:flex;gap:8px;margin-bottom:12px;}
.san{flex:1;border:none;padding:9px;border-radius:10px;cursor:pointer;font-size:0.78rem;font-weight:600;font-family:inherit;}
.san.pr{background:#2c2c2c;color:white;}.san.sc{background:#f5f4f0;color:#666;}
.ss{display:flex;align-items:center;gap:8px;padding:11px 13px;border-radius:10px;margin-bottom:12px;font-size:0.78rem;}
.ss.an{background:#eaf3f9;color:#4a72a0;}.ss.er{background:#faeef0;color:#a04a5a;}.ss.dn{background:#eef6f1;color:#3a7a5a;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin{display:inline-block;animation:spin 1s linear infinite;}
.rc{background:#f8f9fa;border:1.5px solid #e8e6e0;border-radius:12px;padding:13px;margin-bottom:12px;}
.rr{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid #eee;gap:8px;}
.rr:last-child{border-bottom:none;}
.rl{font-size:0.68rem;font-weight:600;color:#aaa;text-transform:uppercase;flex-shrink:0;}
.ra{font-family:'Lora',serif;font-size:1.15rem;font-weight:700;color:#a04a5a;}
.re{background:#faf9f7;border:1.5px solid #e8e6e0;color:#333;padding:4px 8px;border-radius:7px;font-family:inherit;font-size:0.78rem;outline:none;width:100%;max-width:200px;}
.cfb{width:100%;padding:11px;border:none;border-radius:12px;background:#5a8a6a;color:white;font-family:inherit;font-size:0.84rem;font-weight:700;cursor:pointer;margin-top:4px;}

/* RESPONSIVE */
@media(max-width:700px){
  .sg{grid-template-columns:1fr 1fr;}
  .og{grid-template-columns:1fr;}
  .cr{grid-template-columns:1fr;}
  .nav .nb{font-size:0.65rem;padding:5px 9px;}
}
@media(max-width:480px){
  .sg{grid-template-columns:1fr 1fr;}
  .ctrl{gap:5px;}
  .pill{padding:4px 9px;font-size:0.63rem;}
  .sp{display:none;}
  .form-grid{grid-template-columns:1fr 1fr;}
  .form-grid .wide{grid-column:1 / -1;}
}
</style>
</head>

// ── START APP ─────────────────────────────────────────────────────────
function startApp(){
// Listen to entries
const entriesCol=collection(db,"entries");
const q=query(entriesCol,orderBy("date","desc"));
onSnapshot(q,snap=>{
  entries=snap.docs.map(d=>({...d.data(),_id:d.id}));
  syncStatus="ok";
  render();
},err=>{syncStatus="err";render();});

// Listen to limits/settings
const settingsDoc=doc(db,"settings","limits");
onSnapshot(settingsDoc,snap=>{
  if(snap.exists())limits=snap.data();
  render();
});

async function addEntry(){
  if(!state.formDesc.trim()||!state.formAmount||isNaN(parseFloat(state.formAmount)))return;
  const e={
    type:state.formType,desc:state.formDesc,
    amount:parseFloat(state.formAmount),
    category:state.formCategory,incomeCategory:state.formIncCat,
    owner:state.formOwner,tag:state.formTag,date:state.formDate,
    createdAt:Date.now()
  };
  state.formDesc="";state.formAmount="";
  // Clear DOM inputs directly without full re-render
  const di=document.getElementById("inp-desc"),ai=document.getElementById("inp-amt");
  if(di)di.value="";if(ai)ai.value="";
  try{await addDoc(entriesCol,e);}catch(err){alert("Błąd zapisu: "+err.message);}
}

async function delEntry(id){
  try{await deleteDoc(doc(db,"entries",id));}catch(err){alert("Błąd usuwania");}
}

async function saveLimit(catId,val){
  limits[catId]=val;
  try{await setDoc(settingsDoc,limits);}catch(e){}
}

async function confirmScan(){
  const sr=state.scanResult;if(!sr)return;
  const cat=EC.find(c=>c.id===sr.category)?sr.category:"jedzenie";
  const e={type:"wydatek",desc:sr.desc||"Paragon",amount:parseFloat(sr.amount)||0,
    category:cat,incomeCategory:"wynagrodzenie",owner:"przemek",tag:"dom",
    date:sr.date||now.toISOString().slice(0,10),createdAt:Date.now()};
  closeScan();
  try{await addDoc(entriesCol,e);}catch(err){alert("Błąd zapisu");}
}

// ── HELPERS ───────────────────────────────────────────────────────────
function gec(id){return EC.find(c=>c.id===id)||EC[0];}
function gic(id){return IC.find(c=>c.id===id)||IC[0];}
function gow(id){return OW.find(o=>o.id===id)||OW[0];}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function heatColor(val,max,hex){
  if(!val||!max)return"transparent";
  const t=Math.min(val/max,1),r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgba(${r},${g},${b},${0.1+t*0.55})`;
}

function filteredEntries(){
  return entries.filter(e=>{
    const d=new Date(e.date);
    return d.getMonth()===state.month&&d.getFullYear()===state.year
      &&(state.filterTag==="wszystkie"||e.tag===state.filterTag)
      &&(state.filterOwner==="wszyscy"||e.type==="wydatek"||e.owner===state.filterOwner)
      &&(!state.search||e.desc.toLowerCase().includes(state.search.toLowerCase()));
  });
}

function exportCSV(){
  const h=["Data","Typ","Opis","Kategoria","Tag","Osoba","Kwota"];
  const rows=entries.map(e=>{
    const cat=e.type==="wydatek"?gec(e.category).label:gic(e.incomeCategory).label;
    return[e.date,e.type,e.desc,cat,e.tag,e.owner||"",e.amount.toFixed(2)].join(",");
  });
  const blob=new Blob(["\uFEFF"+[h.join(","),...rows].join("\n")],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="budzet.csv";a.click();
}

  // SCAN MODAL
  if(state.scanOpen){
    html+=`<div class="mo" onclick="if(event.target===this)closeScan()"><div class="md"><div class="mh"><div class="mt2">📷 Skanuj paragon</div><button class="mc" onclick="closeScan()">✕</button></div><div class="mb">`;
    if(!state.scanPrev){html+=`<div class="uz" onclick="document.getElementById('fi2').click()"><div style="font-size:2rem;margin-bottom:6px">🧾</div><div style="font-size:.8rem;color:#999;margin-bottom:2px">Kliknij, żeby wybrać zdjęcie paragonu</div><div style="font-size:.68rem;color:#ccc">Na telefonie możesz użyć aparatu</div></div><input id="fi2" type="file" accept="image/*" capture="environment" style="display:none" onchange="handleFile(event)"/>`;}
    if(state.scanPrev) html+=`<img src="${state.scanPrev}" class="pi" alt="paragon"/>`;
    if(state.scanImg&&state.scanStatus==="idle") html+=`<div class="sar"><button class="san sc" onclick="resetScan()">↩ Zmień</button><button class="san pr" onclick="analyzeScan()">🤖 Analizuj paragon</button></div>`;
    if(state.scanStatus==="analyzing") html+=`<div class="ss an"><span class="spin">⏳</span> AI analizuje paragon…</div>`;
    if(state.scanStatus==="error") html+=`<div class="ss er">⚠️ Nie udało się odczytać. Spróbuj z wyraźniejszym zdjęciem.</div>`;
    if(state.scanStatus==="done"&&state.scanResult){
      const sr=state.scanResult;
      html+=`<div class="ss dn">✅ Sprawdź i zatwierdź dane.</div><div class="rc">`;
      html+=`<div class="rr"><span class="rl">Opis</span><input class="re" type="text" value="${esc(sr.desc||"")}" oninput="setSRfield('desc',this.value)"/></div>`;
      html+=`<div class="rr"><span class="rl">Kwota</span><div style="display:flex;align-items:center;gap:7px"><input class="re" type="number" style="max-width:95px" value="${sr.amount||""}" oninput="setSRfield('amount',this.value)"/><span style="font-family:'Lora',serif;font-size:1.1rem;font-weight:700;color:#a04a5a">${parseFloat(sr.amount||0).toFixed(2)} zł</span></div></div>`;
      html+=`<div class="rr"><span class="rl">Kategoria</span><select class="re" onchange="setSR('category',this.value)">${EC.map(c=>`<option value="${c.id}"${sr.category===c.id?" selected":""}>${c.icon} ${c.label}</option>`).join("")}</select></div>`;
      html+=`<div class="rr"><span class="rl">Data</span><input class="re" type="date" value="${sr.date||now.toISOString().slice(0,10)}" onchange="setSR('date',this.value)"/></div>`;
      html+=`</div><button class="cfb" onclick="confirmScan()">✅ Dodaj do budżetu</button>`;
    }
    html+=`</div></div></div>`;
  }

  document.getElementById("app").innerHTML=html;

  // Draw charts
  if(state.view==="wykresy"){
    const pieData=EC.map(c=>({label:c.label,value:bEC[c.id]||0,color:c.color})).filter(d=>d.value>0);
    drawPie(pieData);
    drawBar();
  }
}

function renderTable(rows,title,count,footer,tI,tE,bal,bC){
  let h=`<div class="tc"><div class="th2"><span>${title}</span><span style="font-size:.7rem;color:#bbb">${count} wpisów</span></div>`;
  if(!rows.length){return h+`<div class="empty">Brak wpisów 🙂</div></div>`;}
  h+=`<div class="tbl-wrap"><table><thead><tr><th>Data</th><th>Typ</th><th>Opis</th><th>Kat.</th><th>Tag</th><th>Os.</th><th style="text-align:right">Kwota</th><th></th></tr></thead><tbody>`;
  rows.forEach(e=>{
    const ie=e.type==="wydatek",c=ie?gec(e.category):gic(e.incomeCategory),o=ie?null:gow(e.owner);
    h+=`<tr><td style="color:#bbb">${e.date}</td><td><span class="badge ${ie?"bw":"bi"}">${ie?"Wydatek":"Przychód"}</span></td><td style="font-weight:500;color:#2c2c2c">${esc(e.desc)}</td><td><span class="catbadge" style="background:${c.bg};color:${c.color}">${c.icon} ${c.label}</span></td><td><span class="badge ${e.tag==="dom"?"bd":"bp"}">${e.tag==="dom"?"🏠":"💼"}</span></td><td>${o?`<span class="badge ${o.id==="przemek"?"bpr":"bma"}">${o.avatar}</span>`:'<span style="color:#ddd">—</span>'}</td><td style="text-align:right;font-weight:700;color:${ie?"#a04a5a":"#3a7a5a"}">${ie?"–":"+"}<b>${e.amount.toFixed(2)}</b></td><td><button class="dbtn" onclick="delEntry('${e._id}')">✕</button></td></tr>`;
  });
  h+=`</tbody></table></div>`;
  if(footer) h+=`<div class="tf"><span style="color:#aaa">Przychody:</span><b style="color:#3a7a5a">+${tI.toFixed(2)} zł</b><span style="color:#aaa">Wydatki:</span><b style="color:#a04a5a">–${tE.toFixed(2)} zł</b><span style="color:#aaa">Bilans:</span><b style="color:${bC}">${bal>=0?"+":""}${bal.toFixed(2)} zł</b></div>`;
  return h+`</div>`;
}

function renderExcel(title,cats,dm,mx,cc){
  let h=`<tr class="xsh"><td colspan="15">${title}</td></tr>`;
  cats.forEach(c=>{
    const row=dm[c.id]||Array(12).fill(0),rt=row.reduce((s,v)=>s+v,0);
    h+=`<tr><td style="padding:0"><div class="xcat">${c.icon} ${c.label}</div></td>${row.map(v=>`<td class="xval" style="background:${heatColor(v,mx,cc||c.color)}">${v>0?v.toFixed(0):""}</td>`).join("")}<td class="xsum">${rt>0?rt.toFixed(0):""}</td></tr>`;
  });
  const mt=Array(12).fill(0);cats.forEach(c=>(dm[c.id]||[]).forEach((v,i)=>mt[i]+=v));
  const gt=mt.reduce((s,v)=>s+v,0);
  h+=`<tr class="xsr"><td style="padding:0"><div class="xcat" style="font-weight:700">Suma</div></td>${mt.map(t=>`<td class="xval" style="font-weight:700">${t>0?t.toFixed(0):""}</td>`).join("")}<td class="xsum">${gt>0?gt.toFixed(0):""}</td></tr>`;
  return h;
}

function drawPie(data){
  const canvas=document.getElementById("pieC");if(!canvas)return;
  const W=canvas.parentElement.offsetWidth-32,H=Math.min(W,260);
  canvas.width=W*2;canvas.height=H*2;
  const ctx=canvas.getContext("2d");ctx.scale(2,2);
  const cx=W/2,cy=H/2,r=Math.min(cx,cy)-30;
  const total=data.reduce((s,d)=>s+d.value,0);if(!total)return;
  let a=-Math.PI/2;
  data.forEach(d=>{
    const sa=a,ea=a+(d.value/total)*2*Math.PI;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,sa,ea);ctx.closePath();
    ctx.fillStyle=d.color;ctx.fill();
    ctx.strokeStyle="white";ctx.lineWidth=2;ctx.stroke();
    const ma=(sa+ea)/2,pct=(d.value/total*100).toFixed(0);
    if(d.value/total>0.05){
      ctx.fillStyle="#fff";ctx.font=`bold ${Math.max(9,r*0.14)}px Inter,sans-serif`;
      ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText(pct+"%",cx+Math.cos(ma)*r*0.65,cy+Math.sin(ma)*r*0.65);
    }
    a=ea;
  });
}

function drawBar(){
  const canvas=document.getElementById("barC");if(!canvas)return;
  const W=canvas.parentElement.offsetWidth-32,H=Math.min(W*0.7,220);
  canvas.width=W*2;canvas.height=H*2;
  const ctx=canvas.getContext("2d");ctx.scale(2,2);
  const pad={l:36,r:8,t:10,b:28};
  const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  const barData=MS.map((m,i)=>({
    label:m,
    inc:entries.filter(e=>{const d=new Date(e.date);return e.type==="przychod"&&d.getMonth()===i&&d.getFullYear()===state.year;}).reduce((s,e)=>s+e.amount,0),
    exp:entries.filter(e=>{const d=new Date(e.date);return e.type==="wydatek"&&d.getMonth()===i&&d.getFullYear()===state.year;}).reduce((s,e)=>s+e.amount,0),
  }));
  const maxV=Math.max(1,...barData.map(d=>Math.max(d.inc,d.exp)));
  const bw=cw/MS.length;
  // grid
  [0.25,0.5,0.75,1].forEach(f=>{
    const y=pad.t+ch*(1-f);
    ctx.strokeStyle="#f0ede8";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+cw,y);ctx.stroke();
    ctx.fillStyle="#bbb";ctx.font=`${Math.max(7,W*0.025)}px Inter,sans-serif`;ctx.textAlign="right";ctx.textBaseline="middle";
    const v=maxV*f;ctx.fillText(v>=1000?(v/1000).toFixed(0)+"k":v.toFixed(0),pad.l-3,y);
  });
  barData.forEach((d,i)=>{
    const x=pad.l+i*bw,bwi=bw*0.35;
    const ih=d.inc>0?(d.inc/maxV)*ch:0;
    ctx.fillStyle="#5a8a6a";ctx.beginPath();ctx.roundRect(x+bw*0.05,pad.t+ch-ih,bwi,ih,2);ctx.fill();
    const eh=d.exp>0?(d.exp/maxV)*ch:0;
    ctx.fillStyle="#c07060";ctx.beginPath();ctx.roundRect(x+bw*0.55,pad.t+ch-eh,bwi,eh,2);ctx.fill();
    ctx.fillStyle="#aaa";ctx.font=`${Math.max(7,W*0.022)}px Inter,sans-serif`;ctx.textAlign="center";ctx.textBaseline="top";
    ctx.fillText(d.label.slice(0,3),x+bw/2,pad.t+ch+4);
  });
  // legend
  const fs=Math.max(8,W*0.025);
  ctx.fillStyle="#5a8a6a";ctx.fillRect(pad.l,H-9,10,7);
  ctx.fillStyle="#555";ctx.font=`${fs}px Inter,sans-serif`;ctx.textAlign="left";ctx.textBaseline="middle";ctx.fillText("Przychody",pad.l+13,H-5);
  ctx.fillStyle="#c07060";ctx.fillRect(pad.l+75,H-9,10,7);
  ctx.fillStyle="#555";ctx.fillText("Wydatki",pad.l+88,H-5);
}

// ── GLOBAL ACTIONS ────────────────────────────────────────────────────
// For text inputs: only update state, don't re-render (prevents keyboard closing)
window.setField=(k,v)=>{state[k]=v;};
window.setState=(k,v)=>{state[k]=v;render();};
window.toggle=k=>{state[k]=!state[k];render();};
window.setView=v=>{state.view=v;render();};
window.goMonth=m=>{state.month=m;state.view="dashboard";render();};
window.addEntry=addEntry;
window.delEntry=delEntry;
window.saveLimit=saveLimit;
window.exportCSV=exportCSV;
window.openScan=()=>{state.scanOpen=true;state.scanImg=null;state.scanPrev=null;state.scanStatus="idle";state.scanResult=null;render();};
window.closeScan=()=>{state.scanOpen=false;render();};
window.resetScan=()=>{state.scanImg=null;state.scanPrev=null;state.scanStatus="idle";state.scanResult=null;render();};
window.setSR=(k,v)=>{state.scanResult[k]=v;render();};
window.setSRfield=(k,v)=>{state.scanResult[k]=v;}; // no re-render for text
window.confirmScan=confirmScan;
window.handleFile=ev=>{
  const f=ev.target.files&&ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{const d=e.target.result;state.scanPrev=d;state.scanImg=d.split(",")[1];state.scanStatus="idle";render();};
  r.readAsDataURL(f);
};
window.analyzeScan=()=>{
  if(!state.scanImg)return;
  state.scanStatus="analyzing";render();
  const cl=EC.map(c=>`${c.id}: ${c.label}`).join(", ");
  const pr=`Analizujesz paragon. Odpowiedz TYLKO JSON bez żadnego tekstu:\n{"desc":"opis","amount":liczba,"category":"id","date":"YYYY-MM-DD","note":"notatka"}\nKategorie: ${cl}\nDzisiaj: ${now.toISOString().slice(0,10)}`;
  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:"image/jpeg",data:state.scanImg}},{type:"text",text:pr}]}]})
  }).then(r=>r.json()).then(d=>{
    const txt=d.content?.map(b=>b.text||"").join("").trim();
    state.scanResult=JSON.parse(txt.replace(/```json|```/g,"").trim());
    state.scanStatus="done";render();
  }).catch(()=>{state.scanStatus="error";render();});
};
} // end startApp()

// ── BOOT ──────────────────────────────────────────────────────────────
if(isAuthed()){startApp();}else{renderLogin();}
